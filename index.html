<li><code>self.attribute = value</code> stores data per object.</li>
</ul>
<b>Example:</b> <code>def __init__(self, name): self.name = name</code>`},

function buildSlip(slip) {
  const div = document.createElement('div');
  div.className = 'slip';
  div.id = `slip-${slip.n}`;

  div.innerHTML = `<div class="slip-header"><h2>Slip ${slip.n}</h2><span>50 Marks</span></div>`;

  slip.tasks.forEach((task, idx) => {
    const taskDiv = document.createElement('div');
    taskDiv.className = 'task';

    let content = '';
    if (task.type === 'theory') {
      content = `<div class="theory">${task.content}</div>`;
    } else {
      const rawCode = task.content.replace(/<[^>]+>/g, '');
      const escaped = rawCode.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'").replace(/&quot;/g,'"');
      content = `<div class="code-block"><button class="copy-btn" onclick="copyCode(this)">Copy</button><pre>${task.content}</pre></div>`;
    }

    taskDiv.innerHTML = `
      <div class="task-label">
        <span class="tname">Task ${idx+1}</span>
        <span class="marks">${task.marks} Marks</span>
      </div>
      <div class="task-q">${task.q}</div>
      ${content}`;
    div.appendChild(taskDiv);
  });

  const oral = document.createElement('div');
  oral.className = 'oral';
  oral.textContent = 'Task 3 – Oral (15 Marks): Be ready to explain your code and theory concepts verbally.';
  div.appendChild(oral);

  return div;
}

const container = document.getElementById('slipsContainer');
const navLinks = document.getElementById('navLinks');

slips.forEach(slip => {
  container.appendChild(buildSlip(slip));
  const a = document.createElement('a');
  a.href = `#slip-${slip.n}`;
  a.textContent = slip.n;
  navLinks.appendChild(a);
});

function copyCode(btn) {
  const pre = btn.nextElementSibling;
  const text = pre.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  document.querySelectorAll('.slip').forEach(slip => {
    slip.style.display = slip.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
});
</script>
